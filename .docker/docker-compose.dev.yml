# GH Dashboard - Docker Compose (Development only)

name: gh-dashboard-dev

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-gh_blog}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-gh_blog}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ..
      dockerfile: .docker/Dockerfile.backend.dev
    restart: unless-stopped
    ports:
      - '${API_PORT:-4000}:4000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-gh_blog}?schema=public
      API_PORT: 4000
      NODE_ENV: development
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-min-32-characters-long}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-min-32-characters-long}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      UPLOAD_DIR: /app/uploads
      RUN_SEED: ${RUN_SEED:-true}
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ..:/app
      - backend_node_modules:/app/node_modules
      - uploads_dev_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build:
      context: ..
      dockerfile: .docker/Dockerfile.dashboard.dev
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-3000}:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-}
      WATCHPACK_POLLING: 'true'
    volumes:
      - ..:/app
      - dashboard_node_modules:/app/node_modules
      - dashboard_next:/app/src/dashboard/.next
    depends_on:
      - backend

volumes:
  postgres_dev_data:
  uploads_dev_data:
  backend_node_modules:
  dashboard_node_modules:
  dashboard_next:
