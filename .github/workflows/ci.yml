name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Build-time placeholders — real values are set at deploy time on the VPS.
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/blogy?schema=public
  NEXT_PUBLIC_API_URL: http://localhost:4000
  API_URL: http://localhost:4000
  NEXT_PUBLIC_SITE_URL: http://localhost:3001
  NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ''

jobs:
  checks:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
