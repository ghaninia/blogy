# Blogy — development stack
# Usage: make dev   |   docker compose up --build

name: blogy

services:
  db:
    image: postgres:16-alpine
    container_name: blogy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-blogy}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-blogy}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - blogy

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend.dev
    container_name: blogy-backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - '${API_PORT:-4000}:4000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-blogy}?schema=public
      API_PORT: 4000
      NODE_ENV: development
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-min-32-characters-long}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-min-32-characters-long}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-10}
      RUN_SEED: ${RUN_SEED:-true}
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://127.0.0.1:4000/health > /dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 45s
    networks:
      - blogy

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard.dev
    container_name: blogy-dashboard
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - '${WEB_PORT:-3000}:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-}
      WATCHPACK_POLLING: 'true'
      CHOKIDAR_USEPOLLING: 'true'
    volumes:
      - .:/app
      - dashboard_node_modules:/app/node_modules
      - dashboard_next:/app/src/dashboard/.next
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://127.0.0.1:3000 > /dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - blogy

networks:
  blogy:
    name: blogy-network

volumes:
  postgres_data:
  uploads_data:
  backend_node_modules:
  dashboard_node_modules:
  dashboard_next:
